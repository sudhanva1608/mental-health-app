<!DOCTYPE html>
<html>

<head>

<title>Mental Health Test</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body class="test-page">

<div class="test-container">

<div class="progress-bar">
<div class="progress" id="progress"></div>
</div>

<div id="questionContainer">

<h2 id="questionNumber"></h2>

<p class="question" id="questionText"></p>

<div class="options">

<button onclick="selectAnswer(0)">Never</button>
<button onclick="selectAnswer(1)">Sometimes</button>
<button onclick="selectAnswer(2)">Often</button>
<button onclick="selectAnswer(3)">Always</button>

</div>

</div>

</div>

<script src="js/test.js"></script>

</body>
</html>
